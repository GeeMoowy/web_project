<!doctype html>
<html lang="ru">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Контакты</title>
    <link rel="stylesheet" type="text/css" href="css/bootstrap.min.css">
    <style>
        body {
            background-color: #f8f9fa;
        }

        .sidebar {
            height: 100vh;
            background-color: black;
            color: white;
        }

        .sidebar a {
            color: white;
        }

        .sidebar a:hover {
            background-color: #495057;
        }

        .dropdown-menu {
            background-color: #6c757d; /* Серый фон */
        }
        .dropdown-item {
            color: white; /* Белый текст */
        }
        .dropdown-item:hover {
            background-color: #495057; /* Цвет при наведении */
        }

        /* Добавляем стили для выравнивания dropdown внизу */
        .mt-auto {
            margin-top: auto !important;
        }

        .dropdown-menu-dark {
            background-color: #6c757d;
            color: white;
        }

        .dropdown-item {
            color: white;
        }

        .container {
            padding-right: 15px;
            padding-left: 15px;
            margin-right: auto;
            margin-left: auto;
        }
    </style>
</head>

<body>
    <div class="d-flex">
        <!-- Sidebar (как есть) -->
        <nav class="sidebar d-flex flex-column p-3">
            <h2 style="display: flex; align-items: center;">
                <img src="B.png" alt="Логотип" style="width: 40px; height: 40px; margin-right: 5px;">
                Меню
            </h2>
            <ul class="nav flex-column">
                <li class="nav-item">
                    <a class="nav-link" href="home.html">Главная</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" href="category.html">Категории</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="catalog.html">Заказы</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" href="contacts.html">Контакты</a>
                </li>
            </ul>
            <div class="mt-auto">
                <div class="dropdown">
                    <button class="btn btn-secondary dropdown-toggle" type="button" id="userDropdown" data-bs-toggle="dropdown" aria-expanded="false">
                        Пользователь
                    </button>
                    <ul class="dropdown-menu" aria-labelledby="userDropdown">
                        <li><a class="dropdown-item" href="#">Профиль</a></li>
                        <li><a class="dropdown-item" href="#">Выход</a></li>
                    </ul>
                </div>
            </div>
        </nav>

        <!-- Основной контент -->
        <div class="container">
            <h1 class="text-center mt-4 mb-5">Контакты</h1>
            <div class="row">
                <div class="col-md-6">
                    <form>
                        <div class="mb-3">
                            <label for="name" class="form-label">Имя</label>
                            <input type="text" class="form-control" id="name" placeholder="Ваше имя">
                        </div>
                        <div class="mb-3">
                            <label for="email" class="form-label">Почта</label>
                            <input type="email" class="form-control" id="email" placeholder="Ваш email">
                        </div>
                        <div class="mb-3">
                            <label for="message" class="form-label">Сообщение</label>
                            <textarea class="form-control" id="message" rows="3" placeholder="Ваше сообщение"></textarea>
                        </div>
                        <button type="submit" class="btn btn-primary">Отправить</button>
                    </form>
                </div>
                <div class="col-md-6">
                    <h3>Наши контакты</h3>
                    <p>
                        Мы всегда здесь, где вы хотите нас видеть!
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script type="text/javascript" src="js/bootstrap.bundle.min.js"></script>
</body>

</html>
